# ==============================================================================
# ZH: AI 訓練平台 - AI 模塊編排 (符合架構設計: 註1 模組化提供替換彈性)
# EN: AI Training Platform - AI Module Orchestration (Note 1 Modularity)
#
# ZH: 包含所有使用者在瀏覽器終端內會接觸到的 AI 推理服務
# EN: Contains all AI inference services used by users in browser terminal
#
# ZH: 容器：
#   1. open-webui   - AI 聊天前端介面
#   2. portkey      - LLM API / 模型請求分流網關
#   3. ollama       - 本地備援模型推理引擎
# ==============================================================================

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-platform-webui
    ports:
      - "3000:8080"
    environment:
      # ZH: 透過 Portkey Gateway 連接 LLM（OSS gateway 實際聽 8787）| EN: via Portkey (OSS listens on 8787)
      OLLAMA_API_BASE_URL: http://portkey:8787
      WEBUI_AUTH: "True"
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-defaul-secret-key-please-change}
      ENABLE_COMMUNITY_SHARING: "False"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - portkey
    networks:
      - ai-platform-net
    restart: unless-stopped

  portkey:
    image: portkeyai/gateway:latest
    container_name: ai-platform-portkey
    # ZH: OSS gateway 固定監聽 8787（PORT env 無效），故對外與內部一律走 8787
    # EN: OSS gateway always listens on 8787 (PORT env ignored); use 8787 everywhere
    ports:
      - "8787:8787"
    environment:
      PORT: "8787"
      LOG_LEVEL: info
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-placeholder}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-placeholder}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-placeholder}
      GAMMA_API_KEY: ${GAMMA_API_KEY:-placeholder}
    volumes:
      - ./portkey/config.yaml:/app/config.yaml:ro
    depends_on:
      - ollama
    networks:
      - ai-platform-net
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ai-platform-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ai-platform-net
    restart: unless-stopped
    # ZH: 正式部署 (Ubuntu + NVIDIA GPU) 時取消以下註解
    # EN: Uncomment below for production (Ubuntu + NVIDIA GPU)
    # runtime: nvidia
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all

    # ==============================================================================
networks:
  ai-platform-net:
    # ZH: 與核心層級共享網路 | EN: Shared network with core layer
    driver: bridge
    name: ai-platform-net

volumes:
  open-webui-data:
  ollama-data:
