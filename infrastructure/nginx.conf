# ==============================================================================
# ZH: AI 訓練平台 - Nginx 反向代理設定
# EN: AI Training Platform - Nginx Reverse Proxy Configuration
# ZH: 用途：統一入口、路由分發、WebSocket 支援、健康檢查
# EN: Purpose: Single entry point, routing, WebSocket support, health check
#
# ZH: 路由規則：
# EN: Routing rules:
#   /                    → Open WebUI (:8080)  ZH: 聊天介面 | EN: Chat UI
#   /api/v1/auth/*       → Job Scheduler (:8000) ZH: 認證 API | EN: Auth API
#   /api/v1/jobs/*       → Job Scheduler (:8000) ZH: 任務 API | EN: Jobs API
#   /health              → 200 OK               ZH: 健康檢查 | EN: Health check
# ==============================================================================

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # ZH: 請求體大小限制 (支援大型資料集上傳) | EN: Request body size limit
    client_max_body_size 10G;

    # ZH: 上游服務定義 | EN: Upstream service definitions
    upstream job_scheduler {
        server job-scheduler:8000;
    }

    # ZH: Docker 內部 DNS，讓 open-webui 可在未啟動時延遲解析，避免 nginx 啟動失敗
    # EN: Docker internal DNS so open-webui resolves lazily even if not running
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        server_name _;

        # ==================================================================
        # ZH: 認證 API 路由 | EN: Auth API routing
        # ==================================================================
        location /api/v1/auth/ {
            proxy_pass http://job_scheduler/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==================================================================
        # SSO API 路由
        # ==================================================================
        location /api/v1/sso/ {
            proxy_pass http://job_scheduler/api/v1/sso/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==================================================================
        # ZH: 資料集 API 路由 | EN: Datasets API routing
        # ==================================================================
        location /api/v1/datasets/ {
            proxy_pass http://job_scheduler/api/v1/datasets/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==================================================================
        # ZH: 任務 SSE 串流（M1 修復：必須關閉 buffering 以免延遲）
        # EN: Job SSE stream (M1 fix: disable buffering to avoid latency)
        # ZH: 正則優先匹配 /api/v1/jobs/{uuid}/stream
        # EN: Regex matches /api/v1/jobs/{uuid}/stream first
        # ==================================================================
        location ~* ^/api/v1/jobs/[^/]+/stream$ {
            proxy_pass http://job_scheduler;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;        # ZH: SSE 長連線 | EN: Long-lived SSE
        }

        # ==================================================================
        # ZH: 任務排程 API 路由 | EN: Job Scheduler API routing
        # ZH: M2 修復：加上結尾斜線，避免 /api/v1/jobsXYZ 被誤匹配
        # EN: M2 fix: trailing slash prevents /api/v1/jobsXYZ from leaking through
        # ==================================================================
        location /api/v1/jobs/ {
            proxy_pass http://job_scheduler/api/v1/jobs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==================================================================
        # ZH: AI 助手 API 路由 (串流代理) | EN: AI Assistant API routing
        # ZH: M2 修復：加上結尾斜線 | EN: M2 fix: add trailing slash
        # ==================================================================
        location /api/v1/chat/ {
            proxy_pass http://job_scheduler/api/v1/chat/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # ZH: 支援串流輸出 (SSE) | EN: Support streaming output
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
        }

        # ==================================================================
        # ZH: Notebook 路由已於 Phase E 移除（v1 偽 Notebook 由 v2.0 Lab 取代）
        # EN: Notebook routes removed in Phase E (v1 superseded by v2.0 Lab)
        # ==================================================================

        # ==================================================================
        # ZH: v2.0 Lab 模組 — Session 管理、Secrets、配額 API
        # EN: v2.0 Lab module — session/secrets/quota API
        # ==================================================================
        location /api/v1/lab/ {
            proxy_pass http://job_scheduler/api/v1/lab/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/secrets/ {
            proxy_pass http://job_scheduler/api/v1/secrets/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==================================================================
        # ZH: v2.0 code-server per-user 路由 (auth_request 驗證 JWT)
        # EN: v2.0 code-server per-user routing (auth_request validates JWT)
        # ==================================================================
        # ZH: 路徑 /code/{user_id}/ → 容器 cs-{user_id}:8080
        # ZH: 使用 regex 擷取 user_id 並驗證該 JWT 屬於此 user
        location ~* ^/code/([a-zA-Z0-9_-]+)/ {
            auth_request /_lab_authz;
            auth_request_set $auth_user $upstream_http_x_lab_user;

            # ZH: 內部 Docker DNS 解析 cs-<user_id> 容器
            # EN: Internal Docker DNS resolves cs-<user_id>
            set $upstream_codeserver "cs-$1";
            proxy_pass http://$upstream_codeserver:8080;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 支援（code-server 用 WebSocket 通訊）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 長連線：code-server 持續開啟
            proxy_buffering off;
            proxy_read_timeout 24h;
            proxy_send_timeout 24h;
        }

        # ZH: 內部 auth_request 端點 — 給 job-scheduler 驗證 JWT 與 user 對應
        # EN: Internal auth_request endpoint — validates JWT and user ownership
        location = /_lab_authz {
            internal;
            proxy_pass http://job_scheduler/api/v1/lab/_authz;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Method $request_method;
        }

        # ==================================================================
        # ZH: Job Scheduler 健康檢查 | EN: Job Scheduler health check
        # ==================================================================
        location /api/health {
            proxy_pass http://job_scheduler/health;
            proxy_set_header Host $host;
        }

        # ==================================================================
        # ZH: 訓練平台獨立 Web UI (方案 C) 
        # EN: Independent Web UI for training (Plan C)
        # ==================================================================
        location ^~ /train/ {
            alias /usr/share/nginx/html/train/;
            index index.html;
            try_files $uri $uri/ /train/index.html;
        }

        # ==================================================================
        # ZH: Open WebUI 主介面 (預設路由，延遲解析避免未啟動時崩潰)
        # EN: Open WebUI main interface (lazy DNS so nginx starts without it)
        # ==================================================================
        location / {
            set $open_webui "http://open-webui:8080";
            proxy_pass $open_webui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # ZH: WebSocket 支援 (Open WebUI 即時通訊)
            # EN: WebSocket support (Open WebUI real-time communication)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ==================================================================
        # ZH: Nginx 自身健康檢查端點 | EN: Nginx own health check endpoint
        # ==================================================================
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }

    # ==================================================================
    # ZH: 管理員專屬獨立伺服器 (Port 8888)
    # EN: Dedicated Admin Server (Port 8888)
    # ==================================================================
    server {
        listen 8888;
        server_name _;

        # 靜態管理員前端介面 (admin-ui)
        location / {
            alias /usr/share/nginx/html/admin-ui/;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # 允許存取認證 API (供管理員登入)
        location /api/v1/auth/ {
            proxy_pass http://job_scheduler/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 管理員專屬 API
        location /api/v1/admin/ {
            proxy_pass http://job_scheduler/api/v1/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

    }
}
