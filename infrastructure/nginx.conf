# ==============================================================================
# ZH: AI 訓練平台 - Nginx 反向代理設定
# EN: AI Training Platform - Nginx Reverse Proxy Configuration
# ZH: 用途：統一入口、路由分發、WebSocket 支援、健康檢查
# EN: Purpose: Single entry point, routing, WebSocket support, health check
#
# ZH: 路由規則：
# EN: Routing rules:
#   /                    → Open WebUI (:8080)  ZH: 聊天介面 | EN: Chat UI
#   /api/v1/auth/*       → Job Scheduler (:8000) ZH: 認證 API | EN: Auth API
#   /api/v1/jobs/*       → Job Scheduler (:8000) ZH: 任務 API | EN: Jobs API
#   /health              → 200 OK               ZH: 健康檢查 | EN: Health check
# ==============================================================================

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # ZH: 請求體大小限制 (支援大型資料集上傳) | EN: Request body size limit
    client_max_body_size 10G;

    # ZH: 上游服務定義 | EN: Upstream service definitions
    upstream job_scheduler {
        server job-scheduler:8000;
    }

    upstream open_webui {
        server open-webui:8080;
    }

    server {
        listen 80;
        server_name _;

        # ==================================================================
        # ZH: 認證 API 路由 | EN: Auth API routing
        # ==================================================================
        location /api/v1/auth/ {
            proxy_pass http://job_scheduler/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==================================================================
        # SSO API 路由
        # ==================================================================
        location /api/v1/sso/ {
            proxy_pass http://job_scheduler/api/v1/sso/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==================================================================
        # ZH: 資料集 API 路由 | EN: Datasets API routing
        # ==================================================================
        location /api/v1/datasets/ {
            proxy_pass http://job_scheduler/api/v1/datasets/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==================================================================
        # ZH: 任務排程 API 路由 | EN: Job Scheduler API routing
        # ==================================================================
        location /api/v1/jobs {
            proxy_pass http://job_scheduler/api/v1/jobs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==================================================================
        # ZH: AI 助手 API 路由 (串流代理) | EN: AI Assistant API routing
        # ==================================================================
        location /api/v1/chat {
            proxy_pass http://job_scheduler/api/v1/chat;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # ZH: 支援串流輸出 (SSE) | EN: Support streaming output
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
        }

        # ==================================================================
        # ZH: Job Scheduler 健康檢查 | EN: Job Scheduler health check
        # ==================================================================
        location /api/health {
            proxy_pass http://job_scheduler/health;
            proxy_set_header Host $host;
        }

        # ==================================================================
        # ZH: 訓練平台獨立 Web UI (方案 C) 
        # EN: Independent Web UI for training (Plan C)
        # ==================================================================
        location ^~ /train/ {
            alias /usr/share/nginx/html/train/;
            index index.html;
            try_files $uri $uri/ /train/index.html;
        }

        # ==================================================================
        # ZH: Open WebUI 主介面 (預設路由)
        # EN: Open WebUI main interface (default route)
        # ==================================================================
        location / {
            proxy_pass http://open_webui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # ZH: WebSocket 支援 (Open WebUI 即時通訊)
            # EN: WebSocket support (Open WebUI real-time communication)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ==================================================================
        # ZH: Nginx 自身健康檢查端點 | EN: Nginx own health check endpoint
        # ==================================================================
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }

    # ==================================================================
    # ZH: 管理員專屬獨立伺服器 (Port 8888)
    # EN: Dedicated Admin Server (Port 8888)
    # ==================================================================
    server {
        listen 8888;
        server_name _;

        # 靜態管理員前端介面 (admin-ui)
        location / {
            alias /usr/share/nginx/html/admin-ui/;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # 允許存取認證 API (供管理員登入)
        location /api/v1/auth/ {
            proxy_pass http://job_scheduler/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 管理員專屬 API
        location /api/v1/admin/ {
            proxy_pass http://job_scheduler/api/v1/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 系統設定檔管理 API
        location /api/v1/system/ {
            proxy_pass http://job_scheduler/api/v1/system/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
