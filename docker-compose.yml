# ==============================================================================
# ZH: AI 訓練平台 - 核心基礎設施編排 
# EN: AI Training Platform - Core Infrastructure Orchestration
#
# ZH: 角色：負責平台之底層運作 (對齊架構: 服務層核心)
# EN: Role: Handles platform low-level operations (Service Layer Core)
#
# ZH: 包含：
#   1. nginx         - 反向代理 (單一閘道口)
#   2. job-scheduler - 任務排程 API 與 DB 管理
# ==============================================================================

services:
  nginx:
    image: nginx:alpine
    container_name: ai-platform-nginx
    ports:
      - "80:80"
      - "8888:8888"
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web-ui:/usr/share/nginx/html/train:ro
      - ./admin-ui:/usr/share/nginx/html/admin-ui:ro
    depends_on:
      job-scheduler:
        condition: service_healthy
    networks:
      - ai-platform-net
    restart: unless-stopped

  job-scheduler:
    build:
      context: ./job-scheduler
      dockerfile: Dockerfile
    container_name: ai-platform-scheduler
    ports:
      - "8002:8000"
    environment:
      # ZH: 資料庫路徑 | EN: Database path
      DATABASE_PATH: ${DATABASE_PATH:-/data/ai_platform.db}
      
      # ZH: JWT 安全認證 | EN: JWT Security Authentication
      # ZH: C3 修復：移除預設值，.env 必須提供，缺漏即 fail-fast
      # EN: C3 fix: removed default; container fails fast if .env is missing
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env (min 32 chars)}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}

      # ZH: 全域額度設定 | EN: Global Quota settings
      DEFAULT_MONTHLY_TOKEN_LIMIT: ${DEFAULT_MONTHLY_TOKEN_LIMIT:-100000}
      TOKEN_RESET_DAY: ${TOKEN_RESET_DAY:-1}

      # ZH: Worker 節點驗證 Token | EN: Worker node auth token
      # ZH: C3 修復：移除預設值，.env 必須提供
      # EN: C3 fix: removed default; must be set in .env
      WORKER_API_TOKEN: ${WORKER_API_TOKEN:?WORKER_API_TOKEN must be set in .env}

      # ZH: v2.0 Secrets 加密主金鑰 (KEK) — AES-256-GCM 加密所有使用者 secrets
      # EN: v2.0 Secrets master key (KEK) — AES-256-GCM encrypts all user secrets
      # ZH: WARNING: 變更此 key 會讓所有既存 secrets 失效，必須先全部 re-encrypt
      # EN: WARNING: changing this key invalidates all existing secrets
      SECRETS_MASTER_KEY: ${SECRETS_MASTER_KEY:?SECRETS_MASTER_KEY must be set in .env (min 32 chars)}

      # ZH: CORS 允許來源（逗號分隔，留空允許所有） | EN: CORS origins (comma-sep, empty = allow all)
      CORS_ORIGINS: ${CORS_ORIGINS:-}

      # ZH: Portkey LLM 閘道位址 | EN: Portkey LLM gateway URL
      PORTKEY_URL: ${PORTKEY_URL:-http://ai-platform-portkey:8000/v1/chat/completions}
      PORTKEY_ENABLED: ${PORTKEY_ENABLED:-true}

      # ZH: 任務超時閾值（分鐘）| EN: Job timeout threshold (minutes)
      JOB_TIMEOUT_MINUTES: ${JOB_TIMEOUT_MINUTES:-120}

      # ZH: 日誌 | EN: Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # ZH: GPU 節點與排程之詳細參數設定，已移轉至:
      # job-scheduler/app/scheduler_policy.yaml (依循註2規定統一維護)
    volumes:
      - ./data:/data:rw
      - ./job-scheduler/app:/app/app:rw
      # ZH: C4 修復：.env 與 docker-compose.yml 改為唯讀，避免容器 RCE 後可覆寫主機 secrets
      # EN: C4 fix: .env and docker-compose.yml are read-only — prevents RCE→secret-rewrite
      - ./.env:/app/.env:ro
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      # ZH: v2.0 Lab — 服務層需要 docker SDK 操作 code-server 容器；建議生產環境改用 TCP socket + TLS
      # EN: v2.0 Lab — service layer needs docker SDK to manage code-server; consider TCP+TLS in prod
      - /var/run/docker.sock:/var/run/docker.sock:rw
      # ZH: v2.0 Lab — 共享模型快取（read-only 掛入，所有使用者共用）
      # EN: v2.0 Lab — shared model cache (read-only, shared across all users)
      - shared_models:/opt/models:ro
    networks:
      - ai-platform-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ==============================================================================
# ZH: 統一橋接網路 (供 AI Models 外掛連入)
# EN: Unified Bridged Network (for AI Models to attach)
# ==============================================================================
networks:
  ai-platform-net:
    driver: bridge
    name: ai-platform-net

# ==============================================================================
# ZH: v2.0 Lab 命名 volume — 共享模型快取與 per-user home (動態建立)
# EN: v2.0 Lab named volumes — shared model cache and per-user home (created dynamically)
# ==============================================================================
volumes:
  shared_models:
    name: shared_models
    # ZH: 由管理員用 preload-models.sh 預下載熱門模型至此 volume
    # EN: Pre-populated by admin via preload-models.sh

  # ZH: 注意：per-user home volume (home_{user_id}) 由 lab_manager 在使用者首次
  #     啟動 lab session 時動態建立，不在此宣告
  # EN: Per-user home volumes (home_{user_id}) are created dynamically by lab_manager
  #     on first lab session start; not declared here
