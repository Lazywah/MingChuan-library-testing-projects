# ==============================================================================
# SSO Policy 設定 | SSO Policy Configuration
# ==============================================================================
# ZH: provider 欄位決定載入哪個 SSO client（v2.1 新增）：
#   mock — MockSSOClient (開發測試用，從本檔 mock.users 讀帳號)
#   cas  — CASSSOClient (Yale CAS 協定，學校用 CAS server 時用)
#   oidc — OIDCSSOClient (OIDC 協定，MCU 用 Microsoft Entra ID 走這條)
#
# EN: `provider` decides which SSO client to load (v2.1):
#   mock | cas | oidc
#
# ZH: mock_mode 保留為向後相容欄位（true 時強制走 mock，覆寫 provider）
# EN: mock_mode kept for backward compat (true forces mock, overrides provider)
# ==============================================================================

mock_mode: true            # ⚠️ 開發階段保持 true；正式部署改 false 並切換 provider
provider: mock             # mock | cas | oidc

# ==============================================================================
# Mock SSO 測試帳號 — 僅 mock_mode=true 或 provider=mock 時生效
# ==============================================================================
mock:
  users:
    - student_id: "T1090001"
      password: "T1090001"
      name: "林小明"
      email: "T1090001@school.edu.tw"
      role: "student"
    - student_id: "T1090002"
      password: "T1090002"
      name: "陳靜水"
      email: "T1090002@school.edu.tw"
      role: "student"
    # C-6: ZH: 已移除 admin/admin 硬編碼憑證，管理員帳號請透過資料庫建立
    # EN: Hardcoded admin/admin removed — create admin accounts via DB provisioning instead

# ==============================================================================
# CAS SSO 設定（學術界主流協定；MCU 未使用，留作其他學校未來用）
# ==============================================================================
cas:
  server_url: "https://cas.school.edu.tw/cas"
  service_url: "http://localhost:8000/api/v1/sso/callback"

# ==============================================================================
# OIDC SSO 設定（v2.1 新增 — MCU Microsoft Entra ID）
# ==============================================================================
# ZH: 取得 client_id / client_secret 流程：
#   1. 寄信給 IT，請對方在 Microsoft Entra Admin Center 註冊 App Registration
#   2. 告知 redirect_uri 須一次申請 dev + prod 兩個（見 docs/dev/IT-OIDC-申請信範本.md）
#   3. IT 回覆後將下方 PENDING 替換為真實值
#   4. 重啟 job-scheduler 即生效
#
# ZH: 若 client_id / client_secret 仍是 "PENDING"，工廠函式會自動 fallback 到 mock
#     並 warning，服務不會崩潰（v1.1 I7 失敗保險機制）
# ==============================================================================
oidc:
  tenant_id: "30f2f0eb-3fc8-4a5a-94b5-fffa8944532e"   # MCU Microsoft Entra Tenant ID (公開資訊)
  client_id: "PENDING"          # ⏳ 等 IT 提供
  client_secret: "PENDING"      # ⏳ 等 IT 提供（敏感，正式環境應改放 .env）
  redirect_uri: "http://localhost:8002/api/v1/sso/oidc/callback"   # IT 註冊時須登記
  scopes:
    - "openid"
    - "email"
    - "profile"
  password_change_url: "https://account.activedirectory.windowsazure.com/ChangePassword.aspx"
  password_reset_url:  "https://passwordreset.microsoftonline.com/"
