# ==============================================================================
# ZH: 資源層 (High-End GPU Servers) 排程政策
# EN: Resource Layer Scheduling Policy
#
# ZH: Worker 節點不再於此靜態設定 IP。各 GPU 節點啟動後會透過
#     POST /api/v1/worker/heartbeat 自動上報存活狀態與 GPU 使用率，
#     管理介面的叢集儀表板直接從 WorkerHeartbeat 資料表讀取即時狀態。
#     若需新增節點，只需在該節點的 gpu-worker/docker-compose.yml 設定
#     正確的 SERVICE_LAYER_URL 與 NODE_ID，啟動後即自動出現在儀表板。
#
# EN: Worker nodes are no longer statically registered with IPs here.
#     Each GPU node self-registers via POST /api/v1/worker/heartbeat on startup,
#     reporting live status and GPU utilisation. The admin cluster dashboard reads
#     directly from the WorkerHeartbeat table. To add a new node, set the correct
#     SERVICE_LAYER_URL and NODE_ID in that node's gpu-worker/docker-compose.yml.
# ==============================================================================

# ZH: 佇列排程參數 | EN: Queue Scheduling Parameters
scheduling:
  max_concurrent_jobs: 4              # ZH: 整個叢集最多同時運行的任務數
  job_check_interval_seconds: 10      # ZH: 背景排程輪詢間隔 (秒)
  allow_students: true                # ZH: 學生是否開放申請排程
  max_epochs_per_job: 1000            # ZH: 每筆任務最高迭代次數
  max_batch_size: 512                 # ZH: 最高批次大小限制

# ZH: 本地開發與除錯模式開關 | EN: Local mock mode toggle
mock_mode: true

