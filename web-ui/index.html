<!DOCTYPE html>
<!-- ZH: AI 訓練平台主前端面版 | EN: AI Training Platform Main Frontend Dashboard -->
<html lang="zh-Hant" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Training Platform</title>
    <!-- ZH: 引入 Google 字體 | EN: Import Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- ZH: 引入主任務面板樣式 | EN: Import main stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- ZH: 裝飾背景區域（由 CSS 控制，可自訂圖片） | EN: Decorative background area (Controlled by CSS, custom image ready) -->
    <div class="empty bg-grad custom-bg" id="main-bg"></div>

    <!-- ZH: 系統提示訊息 | EN: System notification toast -->
    <div id="toast" class="toast hidden">
        <span id="toast-icon"></span>
        <span id="toast-msg">Notification Message</span>
    </div>

    <!-- ZH: 視圖: 登入面板 | EN: VIEW: Login panel -->
    <div id="login-view" class="view-container active">
        
        <!-- ZH: 獨立的登入操作列 | EN: Independent login action bar -->
        <div class="login-actions" style="position: absolute; top: 20px; right: 30px; display: flex; gap: 15px; z-index: 10;">
            <!-- ZH: 語言切換 | EN: Language Toggle -->
            <button class="icon-action toggle-lang-btn" title="切換語言 / Toggle Language" style="font-size:30px; background:transparent; border:none; cursor:pointer; color:var(--text-primary); transition:0.3s;">
                <ion-icon name="language-outline"></ion-icon>
            </button>
            <!-- ZH: 主題切換 | EN: Theme Toggle -->
            <button class="icon-action toggle-theme-btn" title="切換主題 / Toggle Theme" style="font-size:30px; background:transparent; border:none; cursor:pointer; color:var(--text-primary); transition:0.3s;">
                <ion-icon name="moon-outline"></ion-icon>
            </button>
        </div>

        <div class="form-box active-popup">
            <span class="close" title="Mock close button">
                <ion-icon name="close-circle-outline"></ion-icon>
            </span>
            <form id="login-form">
                <h1 data-i18n="login_title">Login</h1>
                
                <!-- ZH: 帳號輸入框 | EN: Username Input -->
                <div class="input">
                    <input type="text" id="username" required autocomplete="username" placeholder=" ">
                    <label data-i18n="label_username">Username</label>
                    <ion-icon name="person-outline"></ion-icon>
                </div>
                
                <!-- ZH: 密碼輸入框 | EN: Password Input -->
                <div class="input login-eye">
                    <input type="password" id="password" required autocomplete="current-password" placeholder=" ">
                    <label data-i18n="label_password">Password</label>
                    <span id="eye-toggle">
                        <ion-icon name="eye-off-outline" class="eye-off"></ion-icon>
                        <ion-icon name="eye-outline" class="eye-open"></ion-icon>
                    </span>
                </div>
                
                <button type="submit" class="ready-btn" id="login-btn">
                    <span data-i18n="btn_login">Submit</span>
                </button>
            </form>
        </div>
    </div>

    <!-- ZH: 視圖: HUD 介面主容器 | EN: VIEW: MAIN HUD Container -->
    <div id="dashboard-view" class="view-container hidden">
        <div class="hud-container main-content">
            
            <header>
                <span class="header-left">
                    <div class="logo-image">
                        <ion-icon name="hardware-chip-outline" style="font-size: 40px; color: white;"></ion-icon>
                    </div>
                    <div class="logo">AI_BASE</div>
                </span>

                <!-- ZH: 分頁切換導覽 | EN: Tab Navigation -->
                <div class="header-center">
                    <button class="tab-btn active" id="tab-dash" data-tab="dashboard">
                        <ion-icon name="apps-outline"></ion-icon>
                        <span data-i18n="nav_dashboard">Dashboard</span>
                    </button>
                    <button class="tab-btn" id="tab-chat" data-tab="assistant">
                        <ion-icon name="chatbubbles-outline"></ion-icon>
                        <span data-i18n="nav_assistant">Assistant</span>
                    </button>
                </div>
                
                <nav class="header-right">
                    <div class="user-info">
                        <ion-icon name="person-circle-outline"></ion-icon>
                        <span id="user-display">USER</span>
                        <span id="user-role" class="badge">ROLE</span>
                    </div>
                    
                    <button class="icon-action toggle-lang-btn" title="切換語言 / Toggle Language">
                        <ion-icon name="language-outline"></ion-icon>
                    </button>
                    <button class="icon-action toggle-theme-btn" title="切換主題 / Toggle Theme">
                        <ion-icon name="moon-outline"></ion-icon>
                    </button>
                    <button class="icon-action" id="logout-btn" title="Logout">
                        <ion-icon name="log-out-outline"></ion-icon>
                    </button>
                </nav>
            </header>

            <!-- ZH: 分頁 1: 儀表板視圖 | EN: PAGE 1: Dashboard Content -->
            <main id="dashboard-page" class="hud-grid page-view active">
                
                <!-- ZH: 頂部區塊: 額度分析環 | EN: TOP WIDGE: Token Usage Ring -->
                <section class="widget token-widget form-box-panel">
                    <div class="widget-header">
                        <h3 data-i18n="token_overview">Token Resources</h3>
                    </div>
                    <div class="token-display">
                        <div class="token-ring-container">
                            <svg class="progress-ring" width="120" height="120">
                                <circle class="progress-ring__bg" stroke="rgba(255,255,255,0.1)" stroke-width="10" fill="transparent" r="50" cx="60" cy="60"/>
                                <circle id="token-ring-fill" class="progress-ring__circle" stroke="var(--accent-glow)" stroke-width="10" fill="transparent" r="50" cx="60" cy="60"/>
                            </svg>
                            <div class="token-percentage" id="token-percent">0%</div>
                        </div>
                        
                        <div class="token-details">
                            <div class="stat-row">
                                <span class="stat-label" data-i18n="token_used">Used:</span>
                                <span class="stat-value highlight" id="token-used">0</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label" data-i18n="token_limit">Limit:</span>
                                <span class="stat-value" id="token-limit">0</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label" data-i18n="token_reset">Reset Date:</span>
                                <span class="stat-value warning" id="token-reset">--</span>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- ZH: 左側面板: 發配訓練任務 | EN: LEFT PANE: Submit New Job -->
                <section class="widget submit-widget form-box-panel">
                    <div class="widget-header">
                        <h3 data-i18n="job_compose">New Task</h3>
                    </div>
                    <form id="job-form" class="job-form">
                        
                        <div class="input row-input">
                            <input type="text" id="job-name" required placeholder=" ">
                            <label data-i18n="label_job_name">Job Name</label>
                            <ion-icon name="document-text-outline"></ion-icon>
                        </div>
                        
                        <div class="input row-input">
                            <input type="text" id="model-name" required placeholder=" ">
                            <label data-i18n="label_model_name">Model Identifier</label>
                            <ion-icon name="cube-outline"></ion-icon>
                        </div>
                        
                        <div class="input-select-group">
                            <p data-i18n="label_priority" style="font-size:14px; margin-bottom:5px;">Priority</p>
                            <select id="job-priority" class="select-box">
                                <option value="0" data-i18n="priority_0">0 - BATCH</option>
                                <option value="1" data-i18n="priority_1" selected>1 - NORMAL</option>
                                <option value="2" data-i18n="priority_2">2 - HIGH</option>
                            </select>
                        </div>
                        
                        <div class="row">
                            <div class="input row-input mini-input">
                                <input type="number" id="job-epochs" min="1" max="1000" value="10">
                                <label data-i18n="label_epochs">Epochs</label>
                            </div>
                            <div class="input row-input mini-input">
                                <input type="number" id="job-batch" min="1" max="512" value="32">
                                <label data-i18n="label_batch">Batch Size</label>
                            </div>
                        </div>
                        
                        <button type="submit" class="ready-btn" id="submit-job-btn">
                            <span data-i18n="btn_dispatch">Dispatch Task</span>
                        </button>
                    </form>
                </section>

                <!-- ZH: 右側面板: 活躍的任務佇列清單 | EN: RIGHT PANE: Active & Queued Jobs -->
                <section class="widget list-widget form-box-panel">
                    <div class="widget-header split">
                        <h3 data-i18n="pipeline_active">Active Pipeline</h3>
                        <ion-icon name="refresh-circle-outline" id="refresh-jobs-btn" class="refresh-icon" title="Refresh"></ion-icon>
                    </div>
                    
                    <div class="job-list-container" id="job-list-container">
                        <!-- ZH: 由 JS 動態注入任務 | EN: JS injects jobs here dynamically -->
                        <div class="empty-state">
                            <ion-icon name="radio-outline"></ion-icon>
                            <p data-i18n="msg_no_signal">No Signal / Queue Empty</p>
                        </div>
                    </div>
                </section>

            </main>

            <!-- ZH: 分頁 2: AI 助手視圖 (全螢幕) | EN: PAGE 2: Assistant View (Full Screen) -->
            <main id="assistant-page" class="assistant-container page-view">
                <div class="chat-layout">
                    <!-- ZH: 聊天側邊欄/工具列 | EN: Chat Sidebar/Toolbar -->
                    <aside class="chat-sidebar form-box-panel">
                        <h3 data-i18n="chat_config">Config</h3>
                        <div class="input-select-group">
                            <label data-i18n="label_ai_model">AI Model</label>
                            <select id="chat-model-select" class="select-box">
                                <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                                <option value="claude-3-5-sonnet">Claude 3.5 Sonnet</option>
                                <option value="llama3:latest">Ollama Llama3</option>
                            </select>
                        </div>
                        <button class="ready-btn mini-btn" id="clear-chat-btn">
                            <ion-icon name="trash-outline"></ion-icon>
                            <span data-i18n="btn_clear_chat">Clear Chat</span>
                        </button>
                    </aside>

                    <!-- ZH: 聊天主要區域 | EN: Chat Main Area -->
                    <div class="chat-main">
                        <div id="chat-history" class="chat-history scrollbar-custom">
                            <!-- ZH: 對話內容將由 JS 注入 | EN: Chat content injected by JS -->
                            <div class="ai-bubble intro">
                                <div class="bubble-content" data-i18n="chat_welcome">Hello! How can I help you with your AI research today?</div>
                            </div>
                        </div>
                        
                        <div class="chat-input-area">
                            <form id="chat-form" class="chat-form">
                                <textarea id="chat-input" data-i18n-placeholder="placeholder_chat" placeholder="Type your message here..." required></textarea>
                                <button type="submit" id="send-chat-btn" class="send-btn">
                                    <ion-icon name="send"></ion-icon>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </main>

        </div>
    </div>
    
    <!-- ZH: 載入圖標庫與主程式碼 | EN: Load Icon library and Main Logic -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="app.js"></script>
</body>
</html>
