services:
  gpu-worker:
    build: .
    container_name: mcu-gpu-worker
    restart: unless-stopped
    environment:
      # ================================================================
      # ⚠️ 換主機時只需修改此行：將 IP 改為服務層主機的真實 IP:Port
      # When deploying to a new host, only update the IP in this line
      # ================================================================
      - SERVICE_LAYER_URL=${SERVICE_LAYER_URL:-http://192.168.1.50:8002}

      # ZH: 以下設定通常不需修改，透過 .env 或 docker compose --env-file 覆寫
      # EN: Settings below rarely change; override via .env or --env-file if needed
      - API_TOKEN=${API_TOKEN:-mcu-secret-token}            # ZH: 需與服務層 WORKER_API_TOKEN 一致
      - NODE_ID=${NODE_ID:-gpu-node-01}                     # ZH: 此節點名稱（多台時請各自命名）
      - POLL_INTERVAL=${POLL_INTERVAL:-5}                   # ZH: 領取任務輪詢間隔 (秒)
      - HEARTBEAT_INTERVAL=${HEARTBEAT_INTERVAL:-30}        # ZH: 心跳上報間隔 (秒)
      - GPU_IDLE_UTIL_THRESHOLD=${GPU_IDLE_UTIL_THRESHOLD:-10}  # ZH: GPU 空閒判定門檻(%)；單機共用 GPU 可調高(如90)
      - STORAGE_MOUNT_PATH=${STORAGE_MOUNT_PATH:-C:\storage} # ZH: 宿主機共享儲存路徑

    volumes:
      # ZH: 掛載 Docker Socket 以動態啟動訓練兄弟容器 (Sibling Container Pattern)
      # EN: Mount Docker socket to spawn sibling training containers
      - /var/run/docker.sock:/var/run/docker.sock

    # ZH: GPU 直通：允許 Worker 容器執行 nvidia-smi 查詢 GPU 使用率
    # EN: GPU passthrough: allows the Worker container to run nvidia-smi for utilisation polling
    # ZH: 注意：Worker 本身不執行訓練，僅需 utility 能力即可；訓練容器另行以 --gpus 啟動
    # EN: Note: Worker does not train; it only needs 'utility' capability for nvidia-smi
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [utility]
